name: Deploy
on:
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - name: Sign v2 JSON files
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          for json in static-api/v2/*.json; do
            just sign "$json" <(printf '%s' "$SIGNING_KEY")
          done
      - uses: actions/upload-pages-artifact@v4
        with:
          path: "./static-api"
      - uses: actions/deploy-pages@v4
        id: deployment
